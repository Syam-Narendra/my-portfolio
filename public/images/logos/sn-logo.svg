<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 366 366" fill="none">
  <style>
    :root {
      --mark: #09090b;
    }
    @media (prefers-color-scheme: dark) {
